<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Freese Store</title>
    <!-- Ícones e Fonte -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Link para o SEU novo CSS -->
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <header class="checkout-header">
        <h1>Freese <span>Store</span></h1>
        <a href="../index.html" class="voltar-loja"><i class="fas fa-arrow-left"></i> Voltar para a loja</a>
    </header>

    <div class="checkout-container">
        <!-- Lado Esquerdo: Dados do Cliente -->
        <div class="checkout-form box">
            <h2 class="titulo-sessao"><i class="fas fa-shipping-fast"></i> Endereço de Entrega</h2>
            
            <div class="linha-inputs">
                <div class="form-group">
                    <label>CEP (Digite para buscar)</label>
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9" onblur="buscarCep()">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="estado" placeholder="Ex: RS, SP..." readonly style="background: #eee;">
                </div>
            </div>

            <div class="linha-inputs">
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="cidade" placeholder="Ex: Porto Alegre" readonly style="background: #eee;">
                </div>
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="bairro" placeholder="Seu bairro">
                </div>
            </div>

            <div class="form-group">
                <label>Rua / Avenida</label>
                <input type="text" id="rua" placeholder="Nome da rua">
            </div>
            
            <div class="linha-inputs">
                <div class="form-group">
                    <label>Número</label>
                    <input type="text" id="numero" placeholder="Ex: 123">
                </div>
                <div class="form-group">
                    <label>Complemento</label>
                    <input type="text" id="complemento" placeholder="Apto, Bloco (Opcional)">
                </div>
            </div>

            <h2 class="titulo-sessao" style="margin-top: 40px;"><i class="fas fa-wallet"></i> Forma de Pagamento</h2>
            <div class="form-group">
                <select id="forma-pagamento">
                    <option value="pix">PIX - Aprovação Imediata (Recomendado)</option>
                    <option value="cartao">Cartão de Crédito (Até 12x)</option>
                </select>
            </div>
        </div>

        <!-- Lado Direito: Resumo -->
        <div class="checkout-resumo box">
            <h2 class="titulo-sessao"><i class="fas fa-shopping-bag"></i> Resumo do Pedido</h2>
            
            <div class="lista-itens-resumo" id="lista-resumo-itens">
                <!-- Javascript vai injetar os produtos aqui -->
                <p style="text-align: center; color: #888;">Carregando pedido...</p>
            </div>
            
            <div class="totais">
                <div class="linha-total">
                    <span>Subtotal</span>
                    <span id="valor-subtotal">R$ 0,00</span>
                </div>
                <div class="linha-total">
                    <span>Frete</span>
                    <span style="color: #27ae60; font-weight: bold;">Grátis</span>
                </div>
                <div class="linha-total destaque">
                    <span>Total</span>
                    <span id="valor-total-checkout">R$ 0,00</span>
                </div>
            </div>
            
            <button class="btn-finalizar" id="btn-confirmar-compra" onclick="processarCompra()">
                <i class="fas fa-lock"></i> Confirmar Pedido
            </button>

            <div class="seguranca-msg">
                <i class="fas fa-shield-alt"></i> Seus dados estão protegidos. Ambiente 100% seguro.
            </div>
        </div>
    </div>

    <!-- Script do Checkout -->
    <script src="checkout.js"></script>
    <div id="toast-container"></div>

</body>
</html>
