<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Freese Store</title>
    <!-- Ícones e Fonte -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <header class="checkout-header">
        <a href="../index.html" class="voltar-loja"><i class="fas fa-arrow-left"></i> Voltar</a>
        
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../midias/freese2.png" alt="Freese Store">
        </div>

        <div class="header-seguro">
            <i class="fas fa-lock"></i> Checkout Seguro
        </div>
    </header>

    <div class="checkout-container">
        <!-- Lado Esquerdo: Formulários -->
        <div class="checkout-form">
            <div class="box">
                <h2 class="titulo-sessao">Endereço de Entrega</h2>
                
                <div class="linha-inputs">
                    <div class="form-group">
                        <label>CEP (Digite para buscar)</label>
                        <input type="text" id="cep" placeholder="00000-000" maxlength="9" onblur="buscarCep()">
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <!-- Retirei o style="background: #eee" daqui para controlar no CSS -->
                        <input type="text" id="estado" placeholder="Ex: RS, SP..." readonly class="input-readonly">
                    </div>
                </div>

                <div class="linha-inputs">
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" id="cidade" placeholder="Ex: Porto Alegre" readonly class="input-readonly">
                    </div>
                    <div class="form-group">
                        <label>Bairro</label>
                        <input type="text" id="bairro" placeholder="Seu bairro">
                    </div>
                </div>

                <div class="form-group">
                    <label>Rua / Avenida</label>
                    <input type="text" id="rua" placeholder="Nome da rua">
                </div>
                
                <div class="linha-inputs">
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" id="numero" placeholder="Ex: 123">
                    </div>
                    <div class="form-group">
                        <label>Complemento</label>
                        <input type="text" id="complemento" placeholder="Apto, Bloco (Opcional)">
                    </div>
                </div>
            </div>

            <!-- Caixa separada para Pagamento fica mais elegante -->
            <div class="box" style="margin-top: 30px;">
                <h2 class="titulo-sessao">Forma de Pagamento</h2>
                <div class="form-group" style="margin-bottom: 0;">
                    <select id="forma-pagamento">
                        <option value="pix">PIX - Aprovação Imediata</option>
                        <option value="cartao">Cartão de Crédito (Em até 12x)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Lado Direito: Resumo -->
        <div class="checkout-resumo box">
            <h2 class="titulo-sessao">Resumo do Pedido</h2>
            
            <div class="lista-itens-resumo" id="lista-resumo-itens">
                <!-- Javascript injeta os produtos aqui -->
                <p style="text-align: center; color: #888; font-size: 14px; padding: 20px 0;">Carregando carrinho...</p>
            </div>
            
            <div class="totais">
                <div class="linha-total">
                    <span>Subtotal</span>
                    <span id="valor-subtotal">R$ 0,00</span>
                </div>
                <div class="linha-total">
                    <span>Frete</span>
                    <span class="frete-gratis">Grátis</span>
                </div>
                <div class="linha-total destaque">
                    <span>Total a pagar</span>
                    <span id="valor-total-checkout">R$ 0,00</span>
                </div>
            </div>
            
            <button class="btn-finalizar" id="btn-confirmar-compra" onclick="processarCompra()">
                Finalizar Compra <i class="fas fa-arrow-right"></i>
            </button>

            <div class="seguranca-msg">
                <i class="fas fa-shield-alt"></i> Ambiente criptografado e 100% seguro.
            </div>
        </div>
    </div>

    <script src="checkout.js"></script>
    <div id="toast-container"></div>
</body>
</html>
