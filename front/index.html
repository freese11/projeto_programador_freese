<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Freese Store</title>
  <link rel="stylesheet" href="/front/style.css">
</head>
<body>

  <header class="header">
    <h1 class="logo" onclick="window.location.href='/front/index.html'" style="cursor:pointer">FREESE STORE</h1>
    <input type="text" class="search" placeholder="O que você está buscando?" />
    <div class="acoes">
      <span id="btn-login-abrir" style="cursor:pointer">Login</span>
      <span class="carrinho" style="cursor:pointer">
        🛒 <span id="contador-carrinho">0</span>
      </span>
    </div>
  </header>

  <nav class="menu">
    <a href="/front/index.html" class="active">Início</a>
    <a href="/front/catalago/catalago.html">Catálogo</a>
    <a href="#">Contato</a>
  </nav>

  <section class="banner">
    <div class="banner-overlay">
      <div class="banner-texto">
        <h2>TÊNIS NIKE<br><span>AIR JORDAN</span></h2>
        <p>O clássico Air Jordan em preto e vermelho absoluto. Estilo e conforto premium.</p>
        <button class="btn-banner" onclick="window.location.href='/front/catalago/catalago.html'">COMPRE AGORA</button>
      </div>
    </div>
  </section>

  <main class="conteudo">
    <h2 class="titulo-secao">Destaques Puma 2026</h2>
    <div id="lista-produtos"></div>
  </main>

  <div id="modal-login" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="modal-titulo">Acessar Conta</h2>
      
      <div id="selecao-tipo" class="login-options">
        <button onclick="configurarLogin('cliente')" class="btn-opt">Sou Cliente (Entrar)</button>
        <button onclick="configurarRegistro()" class="btn-opt" style="border-color: #27ae60; color: #27ae60;">Criar Nova Conta</button>
        <hr>
        <button onclick="configurarLogin('admin')" class="btn-opt btn-admin">Administrador</button>
      </div>

      <form id="form-login" class="hidden" onsubmit="efetuarLogin(event)">
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit" class="btn-banner">Entrar</button>
        <p onclick="voltarSelecao()" class="btn-voltar">Voltar</p>
      </form>

      <form id="form-registro" class="hidden" onsubmit="registrarCliente(event)">
        <input type="text" id="reg-nome" placeholder="Nome Completo" required>
        <input type="email" id="reg-email" placeholder="E-mail" required>
        <input type="tel" id="reg-telefone" placeholder="Telefone (WhatsApp)" required>
        <input type="password" id="reg-senha" placeholder="Crie uma Senha" required>
        <button type="submit" class="btn-banner" style="background: #27ae60;">Cadastrar Agora</button>
        <p onclick="voltarSelecao()" class="btn-voltar">Voltar</p>
      </form>
    </div>
  </div>

  <div id="carrinho-lateral" class="carrinho-sidebar">
      <div class="carrinho-header">
          <h2>Seu Carrinho</h2>
          <span class="fechar-carrinho" onclick="toggleCarrinho()">&times;</span>
      </div>
      <div id="itens-carrinho" class="carrinho-itens-lista"></div>
      <div class="carrinho-footer">
          <div class="total-container">
              <span>Total:</span>
              <span id="valor-total-carrinho">R$ 0,00</span>
          </div>
          <button onclick="finalizarCompra()" class="btn-finalizar">FINALIZAR COMPRA</button>
      </div>
  </div>
  <div id="carrinho-overlay" onclick="toggleCarrinho()"></div>

  <footer class="footer">
    © 2026 Freese Store - Todos os direitos reservados
  </footer>

  <script src="/front/index.js" defer></script>
</body>
</html>
