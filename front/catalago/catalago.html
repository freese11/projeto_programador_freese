<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Completo | Freese Store</title>
  <link rel="stylesheet" href="catalago.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="top-bar">
    <span><i class="fas fa-truck"></i> FRETE GRÁTIS EM COMPRAS ACIMA DE R$ 499</span>
</div>

<header class="header">
  <div class="logo" onclick="window.location.href='/index.html'">
      <img src="/midias/freese2.png" alt="Freese Store">
  </div>

  <input type="text" id="input-busca" class="search" placeholder="Buscar por modelo ou marca..." />

  <div class="acoes">
      <span id="btn-login-abrir" style="cursor:pointer"><i class="far fa-user"></i> Login</span>
      <span class="carrinho" id="abrir-carrinho" style="cursor:pointer">
        <i class="fas fa-shopping-bag"></i> <span id="contador-carrinho">0</span>
      </span>
  </div>
</header>

<nav class="menu">
  <a href="/index.html">Início</a>
  <a href="/catalago/catalago.html" class="active">Catálogo</a>
  <a href="/contato/contato.html">Contato</a>
</nav>

<main class="conteudo-catalago">
    <div class="header-pagina">
      <h2>Explore Nosso <span>Estoque</span></h2>
      <p>As melhores marcas do street wear mundial em um só lugar.</p>
    </div>

    <div class="filtros-container">
      <div class="filtro-grupo">
        <label><i class="fas fa-filter"></i> Categoria:</label>
        <select id="filtro-categoria" class="select-filtro">
          <option value="todos">Todas</option>
          <option value="camisa">Camisas</option>
          <option value="bone">Bonés</option>
          <option value="moletom">Moletons</option>
          <option value="tenis">Tênis</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label><i class="fas fa-tags"></i> Marca:</label>
        <select id="filtro-marca" class="select-filtro">
          <option value="todos">Todas Marcas</option>
          <option value="nike">Nike</option>
          <option value="puma">Puma</option>
          <option value="bmw">BMW</option>
          <option value="adidas">Adidas</option>
          <option value="lacoste">Lacoste</option>
          <option value="mizuno">Mizuno</option>
        </select>
      </div>
    </div>
    
    <div id="lista-produtos-geral" class="grid-catalago"></div>
</main>

<!-- MODAL DE LOGIN E REGISTRO -->
<div id="modal-login" class="modal">
    <div class="modal-content">
      <!-- 👇 O 'X' AGORA FECHA INSTANTANEAMENTE 👇 -->
      <span class="close-modal" onclick="this.closest('.modal').style.display='none'">&times;</span>
      <h2 id="modal-titulo">Acessar Conta</h2>
      
      <div id="selecao-tipo" class="login-options">
        <button onclick="configurarLogin('cliente')" class="btn-opt">Sou Cliente (Entrar)</button>
        <button onclick="configurarRegistro()" class="btn-opt btn-opt-new">Criar Nova Conta</button>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        <button onclick="configurarLogin('admin')" class="btn-opt btn-admin">Acesso Administrador</button>
      </div>

      <form id="form-login" class="hidden" onsubmit="efetuarLogin(event)">
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit" class="btn-primary">ENTRAR</button>
        <p onclick="voltarSelecao()" class="btn-voltar">Voltar</p>
      </form>

      <!-- 👇 FORMULÁRIO DE REGISTRO IGUAL DA HOME (COM FOTO) 👇 -->
      <form id="form-registro" class="hidden" onsubmit="registrarCliente(event)">
        <div style="text-align: center; margin-bottom: 20px;">
            <img id="preview-foto-registro" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #eee; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <br>
            <label for="reg-foto" style="cursor: pointer; color: #333; font-size: 13px; font-weight: bold; text-decoration: underline;"><i class="fas fa-camera"></i> Escolher Foto (Opcional)</label>
            <input type="file" id="reg-foto" accept="image/*" style="display: none;" onchange="previewImagemRegistro(event)">
        </div>

        <input type="text" id="reg-nome" placeholder="Nome Completo" required>
        <input type="email" id="reg-email" placeholder="E-mail" required>
        <input type="tel" id="reg-telefone" placeholder="WhatsApp" required>
        <input type="password" id="reg-senha" placeholder="Senha" required>
        <button type="submit" class="btn-primary">FINALIZAR CADASTRO</button>
        <p onclick="voltarSelecao()" class="btn-voltar">Já tem conta? Entrar.</p>
      </form>
    </div>
</div>

<!-- MODAL DE MEU PERFIL (ÚNICO E CORRIGIDO) -->
<div id="modal-perfil" class="modal">
    <div class="modal-content" style="text-align: center;">
      <!-- 👇 O 'X' AGORA FECHA INSTANTANEAMENTE 👇 -->
      <span class="close-modal" onclick="this.closest('.modal').style.display='none'">&times;</span>
      
      <h2>Meu Perfil</h2>
      
      <div style="margin: 20px 0;">
          <img id="preview-foto-perfil" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="Sua Foto" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.15); margin-bottom: 15px;">
          <br>
          <label for="foto-perfil" style="cursor: pointer; color: #111; font-size: 14px; font-weight: bold; text-decoration: underline;"><i class="fas fa-camera"></i> Trocar Foto</label>
          <input type="file" id="foto-perfil" accept="image/*" style="display: none;" onchange="previewImagemPerfil(event)">
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 25px;">
          <button onclick="salvarFotoPerfil()" class="btn-primary">SALVAR FOTO</button>
          <button onclick="sairConta()" class="btn-sair">SAIR DA CONTA</button>
      </div>
    </div>
</div>

<!-- CARRINHO LATERAL -->
<div id="carrinho-lateral" class="carrinho-sidebar">
    <div class="carrinho-header">
        <h2>Seu Carrinho</h2>
        <span class="fechar-carrinho" onclick="toggleCarrinho()">&times;</span>
    </div>
    <div id="itens-carrinho" class="carrinho-itens-lista"></div>
    <div class="carrinho-footer">
        <div class="total-container">
            <span>Total:</span>
            <span id="valor-total-carrinho">R$ 0,00</span>
        </div>
        <!-- 👇 Botão arrumado apontando para checkout 👇 -->
        <button id="btn-finalizar-compra" onclick="window.location.href='/checkout/checkout.html'">FINALIZAR COMPRA</button>
    </div>
</div>
<div id="carrinho-overlay" onclick="toggleCarrinho()"></div>

<script src="catalago.js" defer></script>
</body>
</html>
