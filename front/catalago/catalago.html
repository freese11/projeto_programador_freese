<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Completo - Freese Store</title>
  <link rel="stylesheet" href="catalago.css">
</head>
<body>

  <header class="header">
    <h1 class="logo">FREESE STORE</h1>
    <input type="text" id="input-busca" class="search" placeholder="O que você está buscando no catálogo?" />
    <div class="acoes">
      <span id="btn-login-abrir" style="cursor:pointer">Login</span>
      <span class="carrinho">
        🛒 <span id="contador-carrinho">0</span>
      </span>
    </div>
  </header>

  <nav class="menu">
    <a href="/front/index.html">Início</a>
    <a href="/front/catalago/catalago.html" class="active">Catálogo</a>
    <a href="#">Contato</a>
  </nav>

  <main class="conteudo-catalago">
    <div class="header-pagina">
      <h2>Nosso Catálogo</h2>
      <p>Explore todos os nossos produtos exclusivos</p>
    </div>

    <div class="filtros-container">
      <div class="filtro-grupo">
        <label for="filtro-categoria">Categoria:</label>
        <select id="filtro-categoria" class="select-filtro">
          <option value="todos">Todas</option>
          <option value="camisa">Camisas</option>
          <option value="bone">Bonés</option>
          <option value="moletom">Moletons</option>
          <option value="tenis">Tênis</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtro-marca">Marca:</label>
        <select id="filtro-marca" class="select-filtro">
          <option value="todos">Todas Marcas</option>
          <option value="nike">Nike</option>
          <option value="puma">Puma</option>
          <option value="bmw">BMW</option>
        </select>
      </div>
    </div>
    
    <div id="lista-produtos-geral" class="grid-catalago">
      </div>
  </main>

  <div id="modal-login" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="modal-titulo">Acessar Conta</h2>
      
      <div id="selecao-tipo" class="login-options">
        <button onclick="configurarLogin('cliente')" class="btn-opt">Sou Cliente</button>
        <button onclick="configurarRegistro()" class="btn-opt" style="border-color: #27ae60; color: #27ae60;">Criar Conta</button>
        <hr>
        <button onclick="configurarLogin('admin')" class="btn-opt btn-admin">Administrador</button>
      </div>

      <form id="form-login" class="hidden" onsubmit="efetuarLogin(event)">
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit" class="btn-entrar">Entrar</button>
        <p onclick="voltarSelecao()" class="btn-voltar">Voltar</p>
      </form>

      <form id="form-registro" class="hidden" onsubmit="registrarCliente(event)">
        <input type="text" id="reg-nome" placeholder="Nome Completo" required>
        <input type="email" id="reg-email" placeholder="E-mail" required>
        <input type="tel" id="reg-telefone" placeholder="Telefone" required>
        <input type="password" id="reg-senha" placeholder="Crie uma Senha" required>
        <button type="submit" class="btn-entrar" style="background: #27ae60;">Cadastrar</button>
        <p onclick="voltarSelecao()" class="btn-voltar">Voltar</p>
      </form>
    </div>
  </div>

  <footer class="footer">
    © 2026 Freese Store - Todos os direitos reservados
  </footer>



<div id="carrinho-lateral" class="carrinho-sidebar">
    <div class="carrinho-header">
        <h2>Seu Carrinho</h2>
        <span class="fechar-carrinho" onclick="toggleCarrinho()">&times;</span>
    </div>
    
    <div id="itens-carrinho" class="carrinho-itens-lista">
        </div>

    <div class="carrinho-footer">
        <div class="total-container">
            <span>Total:</span>
            <span id="valor-total-carrinho">R$ 0,00</span>
        </div>
        <button onclick="finalizarCompra()" class="btn-finalizar">FINALIZAR COMPRA</button>
    </div>
</div>

<div id="carrinho-overlay" onclick="toggleCarrinho()"></div>

  <script src="catalago.js" defer></script>
</body>
</html>
