<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Freese Store</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="logo">FREESE STORE <span class="badge">ADMIN</span></div>
        <nav class="admin-nav">
            <a href="../catalago/catalago.html">Ver Loja</a>
            <button id="btn-sair" onclick="logout()">Sair</button>
        </nav>
    </header>

    <main class="admin-main">
        <section class="card">
            <h2>Cadastrar Novo Produto</h2>
            <form id="form-produto" class="admin-form">
                <div class="input-group">
                    <input type="text" id="nome" placeholder="Nome do Produto (Ex: Camisa Nike)" required>
                    <input type="number" id="valor" step="0.01" placeholder="Preço (R$)" required>
                </div>
                <div class="input-group">
                    <input type="text" id="img" placeholder="URL da Imagem">
                    <select id="categoria-select">
                        <option value="">Selecione a Categoria</option>
                        <option value="camisa">Camisa</option>
                        <option value="bone">Boné</option>
                        <option value="tenis">Tênis</option>
                        <option value="moletom">Moletom</option>
                    </select>
                </div>
                <button type="submit" class="btn-salvar">Adicionar ao Catálogo</button>
            </form>
        </section>

        <section class="card">
            <h2>Produtos no Inventário</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Foto</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-produtos-corpo">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
