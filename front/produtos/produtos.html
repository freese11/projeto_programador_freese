<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Produtos | Freese Store</title>
    <link rel="stylesheet" href="produtos.css">
    <!-- Adicionado FontAwesome para os ícones do Toast e Tabela funcionarem -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <div class="left">
        <button class="btn-voltar" onclick="voltar()">← Voltar</button>
        <h1>Gerenciamento de Produtos</h1>
    </div>
    <button class="btn-novo" onclick="abrirModalNovo()">+ Novo Produto</button>
</header>

<section class="filtros">
    <input type="text" id="filtro-nome" placeholder="Buscar produto..." oninput="filtrar()">

    <select id="filtro-status" onchange="filtrar()">
        <option value="">Todos</option>
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
    </select>
</section>

<div class="tabela-container">
<table>
    <thead>
        <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Marca</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabela-produtos"></tbody>
</table>
</div>

<!-- MODAL DE CRIAR/EDITAR PRODUTO -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-titulo">Novo Produto</h2>

        <input type="hidden" id="codproduto">

        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="marca" placeholder="Marca">
        <input type="number" id="valor" placeholder="Preço">
        <input type="number" id="estoque" placeholder="Estoque">
        <input type="text" id="tipo" placeholder="Tipo">
        <input type="text" id="cor" placeholder="Cor">
        <input type="text" id="tamanho" placeholder="Tamanho">
        <input type="text" id="img" placeholder="URL da imagem" oninput="previewImagem()">

        <img id="preview" class="preview-img" style="display: none;">

        <select id="ativoinativo">
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
        </select>

        <div class="modal-buttons">
            <button class="salvar" onclick="salvar()">Salvar</button>
            <button class="cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
<div id="modal-confirmacao-excluir" class="modal">
    <div class="modal-content" style="max-width: 350px; text-align: center; padding: 30px;">
        <h3 style="margin-bottom: 15px; font-weight: 900; text-transform: uppercase; color: #111;">Excluir Produto?</h3>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Esta ação removerá o produto da loja. Tem certeza?</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModalExcluir()" class="btn-cancelar">CANCELAR</button>
            <button onclick="confirmarExclusao()" class="btn-confirmar-sair">SIM, EXCLUIR</button>
        </div>
    </div>
</div>

<!-- CONTAINER PARA NOTIFICAÇÕES TOAST -->
<div id="toast-container"></div>

<script src="produtos.js"></script>
</body>
</html>
