<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Vendas | Freese Store</title>
    <link rel="stylesheet" href="vendas.css">
    <!-- Importando a biblioteca de Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome para os ícones do Toast e Tabela -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <div class="left">
        <button class="btn-voltar" onclick="voltar()">← Voltar</button>
        <h1>Gerenciamento de Vendas</h1>
    </div>
    <button class="btn-novo" onclick="carregar()"><i class="fas fa-redo-alt"></i> Atualizar Dados</button>
</header>

<!-- Resumo e Gráfico -->
<div class="dashboard-container">
    <div class="dashboard-resumo">
        <div class="card">
            <h3>Faturamento Total</h3>
            <p id="total-faturamento">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Pedidos Realizados</h3>
            <p id="total-pedidos">0</p>
        </div>
    </div>

    <div class="grafico-container">
        <canvas id="graficoVendas"></canvas>
    </div>
</div>

<section class="filtros">
    <input type="text" id="filtro-id" placeholder="Buscar por Cód. Venda..." oninput="filtrar()">

    <select id="filtro-status" onchange="filtrar()">
        <option value="">Todos os Status</option>
        <option value="pendente">Pendente</option>
        <option value="concluido">Concluído</option>
        <option value="cancelado">Cancelado</option>
    </select>
</section>

<div class="tabela-container">
<table>
    <thead>
        <tr>
            <th>Cód. Venda</th>
            <th>Cliente</th>
            <th>Data</th>
            <th>Total</th>
            <th>Endereço</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabela-vendas"></tbody>
</table>
</div>

<!-- MODAL PARA ATUALIZAR STATUS -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-titulo">Atualizar Venda #<span id="venda-id-display"></span></h2>

        <input type="hidden" id="codvenda">

        <label>Status do Pedido</label>
        <select id="status-venda">
            <option value="pendente">Pendente</option>
            <option value="concluido">Concluído</option>
            <option value="cancelado">Cancelado</option>
        </select>

        <div class="modal-buttons">
            <button class="salvar" onclick="salvarStatus()">Salvar Status</button>
            <button class="cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- NOVO MODAL: DETALHES DOS PRODUTOS DA VENDA -->
<div id="modal-detalhes" class="modal">
    <div class="modal-content" style="max-width: 500px; max-height: 85vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Detalhes da Venda #<span id="detalhes-id"></span></h2>
            <button onclick="fecharModalDetalhes()" style="background: none; border: none; font-size: 22px; cursor: pointer; color: #999;"><i class="fas fa-times"></i></button>
        </div>
        
        <div id="lista-produtos-comprados">
            <!-- O JS vai injetar as fotos, nomes e tamanhos aqui -->
        </div>

        <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 800; color: #888; text-transform: uppercase; font-size: 14px;">Total Pago:</span>
            <h3 id="detalhes-total" style="margin: 0; color: var(--premium-red); font-size: 24px; font-weight: 900;">R$ 0,00</h3>
        </div>
    </div>
</div>

<!-- CONTAINER PARA NOTIFICAÇÕES TOAST -->
<div id="toast-container"></div>

<script src="vendas.js"></script>
</body>
</html>
