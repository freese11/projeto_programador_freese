<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Pedidos | Freese Store</title>
  <link rel="stylesheet" href="meus-pedidos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="logo" onclick="window.location.href='/index.html'">
      <img src="/midias/freese2.png" alt="Freese Store">
  </div>
  
  <div style="flex-grow: 1;"></div>

  <div class="acoes">
      <span id="btn-login-abrir" onclick="window.location.href='/index.html'"><i class="fas fa-arrow-left"></i> Voltar à Loja</span>
  </div>
</header>

<main class="conteudo-pedidos">
    <div class="header-pagina">
      <h2>Meus <span>Pedidos</span></h2>
      <p>Histórico completo das suas peças exclusivas.</p>
    </div>

    <!-- O JAVASCRIPT VAI INJETAR OS PEDIDOS AQUI -->
    <div id="lista-pedidos" class="pedidos-container">
        <h3 style="text-align: center; color: #666; width: 100%; margin-top: 50px;">Buscando seus pedidos...</h3>
    </div>
</main>

<!-- MODAL DE DETALHES DO PEDIDO -->
<div id="modal-detalhes" class="modal-overlay" style="display: none;">
    <div class="modal-conteudo">
        <div class="modal-header">
            <h3>Detalhes do <span>Pedido</span></h3>
            <button class="btn-fechar" onclick="fecharModal()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="modal-body">
            <div class="info-resumo" id="modal-info-resumo">
                <!-- Javascript vai preencher o nº do pedido e data aqui -->
            </div>
            
            <h4 class="titulo-produtos">Itens Comprados</h4>
            <div class="lista-produtos-comprados" id="modal-lista-produtos">
                <!-- Javascript vai preencher os produtos aqui -->
            </div>
            
            <div class="modal-footer-total">
                <span>Total Pago:</span>
                <h3 id="modal-valor-total">R$ 0,00</h3>
            </div>
        </div>
    </div>
</div>

<!-- CONTAINER PARA NOTIFICAÇÕES TOAST EXCLUSIVAS -->
<div id="toast-container"></div>

<script src="meus-pedidos.js"></script>
</body>
</html>
