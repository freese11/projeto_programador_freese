<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Usuários | Freese Store</title>
    <link rel="stylesheet" href="usuarios.css">
    <!-- FontAwesome para os ícones do Toast e Tabela -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <div class="left">
        <button class="btn-voltar" onclick="voltar()">← Voltar</button>
        <h1>Gerenciamento de Usuários</h1>
    </div>
    <button class="btn-novo" onclick="abrirModal(false)">+ Novo Usuário</button>
</header>

<div class="abas-container">
    <button id="aba-clientes" class="btn-aba ativo" onclick="mudarAba('cliente')">👤 Clientes</button>
    <button id="aba-adms" class="btn-aba" onclick="mudarAba('adm')">🛡️ Administradores</button>
</div>

<section class="filtros">
    <input type="text" id="filtro-nome" placeholder="Buscar por nome ou e-mail..." oninput="filtrar()">
</section>

<div class="tabela-container">
    <table>
        <thead>
            <tr>
                <th>Foto</th>
                <th>ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Número</th>
                <th>Perfil</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-usuarios">
            <!-- Usuários injetados via JS -->
        </tbody>
    </table>
</div>

<!-- MODAL DE CRIAR/EDITAR -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-titulo">Novo Usuário</h2>

        <input type="hidden" id="codusuario">

        <div class="foto-upload-container">
            <img id="preview-foto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Preview" class="avatar-preview">
            <label for="foto" class="btn-upload">Escolher Foto</label>
            <input type="file" id="foto" accept="image/*" style="display: none;" onchange="previewImagem(event)">
        </div>

        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Ex: Maria Eduarda">
        
        <label>E-mail</label>
        <input type="email" id="email" placeholder="maria@email.com">
        
        <label>Senha</label>
        <input type="text" id="senha" placeholder="Digite a senha">
        
        <label>Número (WhatsApp/Celular)</label>
        <input type="text" id="numero" placeholder="51999999999">
        
        <label>Perfil</label>
        <select id="perfil">
            <option value="cliente">Cliente</option>
            <option value="adm">Administrador</option>
        </select>

        <div class="modal-buttons">
            <button class="salvar" onclick="salvar()">Salvar</button>
            <button class="cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
<div id="modal-confirmacao-excluir" class="modal">
    <div class="modal-content" style="max-width: 350px; text-align: center; padding: 30px;">
        <h3 style="margin-bottom: 15px; font-weight: 900; text-transform: uppercase; color: #111;">Excluir Usuário?</h3>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Esta ação removerá o usuário permanentemente. Tem certeza?</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModalExcluir()" class="btn-cancelar">CANCELAR</button>
            <button onclick="confirmarExclusao()" class="btn-confirmar-sair">SIM, EXCLUIR</button>
        </div>
    </div>
</div>

<!-- CONTAINER PARA NOTIFICAÇÕES TOAST -->
<div id="toast-container"></div>

<script src="usuarios.js"></script>
</body>
</html>
